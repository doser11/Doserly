name: Admin API CI

on:
  push:
    paths:
      - 'apps/admin-api/**'
      - '.github/workflows/admin-api-ci.yml'
  pull_request:
    paths:
      - 'apps/admin-api/**'
      - '.github/workflows/admin-api-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q
